<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>به زودی - فروشگاهی سِروا</title>
    <!-- Tailwind CSS -->
    <script src="libs/tailwind/tailwind.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="libs/fontawesome/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/custom.css">
    
    <!-- Tailwind Config -->
    <script src="js/tailwind-config.js"></script>
</head>
<body class="bg-gray-50">
    <!-- Coming Soon Content -->
    <section class="min-h-screen flex items-center justify-center relative">
        <div class="absolute inset-0 bg-cover bg-center bg-no-repeat" style="background-image: url('images/banner/banner-3.jpg');"></div>
        <div class="absolute inset-0 bg-gradient-to-l from-primary/80 to-blue-600/80"></div>
        <div class="max-w-2xl mx-auto text-center px-4 text-white relative z-10">
            <div class="mb-8">
                <i class="fas fa-rocket text-6xl md:text-8xl mb-6"></i>
            </div>
            <h1 class="text-4xl md:text-6xl font-bold mb-4">به زودی...</h1>
            <p class="text-xl md:text-2xl mb-8 text-white/90">ما در حال آماده‌سازی چیزی فوق‌العاده هستیم!</p>
            <div class="bg-white/10 backdrop-blur rounded-xl p-6 mb-8">
                <p class="text-lg mb-4">برای اطلاع از شروع کار، ایمیل خود را وارد کنید:</p>
                <form class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
                    <input type="email" placeholder="ایمیل شما" 
                           class="flex-1 px-4 py-3 rounded-lg text-dark focus:outline-none">
                    <button type="submit" class="px-6 py-3 bg-white text-primary rounded-lg font-medium hover:bg-gray-100 transition">
                        اطلاع‌رسانی
                    </button>
                </form>
            </div>
            <div class="flex justify-center gap-4">
                <a href="index.html" class="px-6 py-3 bg-white text-primary rounded-lg font-medium hover:bg-gray-100 transition">
                    بازگشت به صفحه اصلی
                </a>
            </div>
        </div>
    </section>
</body>
</html>
