<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کارت سه‌بعدی توکان</title>
    <style>
        @font-face {
            font-family: 'Vazir';
            src: url('https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.eot');
            src: url('https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.eot?#iefix') format('embedded-opentype'),
                url('https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.woff') format('woff'),
                url('https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Vazir', sans-serif;
            perspective: 1000px;
        }

        .card {
            cursor: pointer;
            width: 150px;
            height: 200px;
            border-radius: 25px;
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
            position: relative;
            box-shadow:
                0 20px 50px rgba(74, 0, 224, 0.4),
                0 10px 30px rgba(74, 0, 224, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
            transform-style: preserve-3d;
            padding: 20px;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-10px) rotateX(5deg);
            box-shadow:
                0 30px 70px rgba(74, 0, 224, 0.5),
                0 15px 40px rgba(74, 0, 224, 0.4);
        }

        .card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 50%);
            transform: rotate(45deg);
            z-index: 1;
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                left: -50%;
                top: -50%;
            }

            100% {
                left: 150%;
                top: 150%;
            }
        }

        .card-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }

        .logo {
            width: 100px;
            margin-bottom: 25px;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.2));
            transition: all 0.3s ease;
        }

        .card:hover .logo {
            transform: scale(1.05);
        }

        .title {
            color: #ffffff;
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 0px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .description {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 12px;
            margin-top: 5px;
            max-width: 80%;
        }

        .decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.1;
            background-image:
                radial-gradient(circle at 20% 30%, white 5px, transparent 5px),
                radial-gradient(circle at 80% 70%, white 8px, transparent 8px),
                radial-gradient(circle at 30% 80%, white 6px, transparent 6px),
                radial-gradient(circle at 70% 20%, white 7px, transparent 7px);
            background-size: 100% 100%;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="decoration"></div>
        <div class="card-content">
            <img src="tokan-logo.png" class="logo" alt="لوگو توکان" />
            <div class="title">
                فروشگاه ساز توکان
            </div>
            <div class="description">
                توکان، دکان دیجیتال شما
            </div>
        </div>
    </div>
</body>

</html>
