worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  server {
    listen 80 default_server;
    server_name tokan.app _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Static files with cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # Store/subdomain redirects
    location ~ ^/store/([a-z0-9-]+)$ {
      return 301 $scheme://$1.tokan.app;
    }
    location ~ ^/st/([a-z0-9-]+)$ {
      return 301 $scheme://$1.tokan.app;
    }
    location ~ ^/rd/([a-z0-9-]+)/([a-z0-9-]+)$ {
      return 301 $scheme://$1.tokan.app/order/$2;
    }

    # SPA-style fallback for client-side routing
    location / {
      try_files $uri $uri/ $uri.html /index.html =404;
    }
  }
}
